    .change{

        height: 50px;
        background-color: red;
        text-align: center;
        line-height: 50px;
    }
    /*.bg:nth-child(2) */
    .neon{
        background-color:#44c767;
        border:3px solid #18ab29;
        display:inline-block;
        cursor:pointer;
        color:#ffffff;
        font-family:Arial;
        font-size:17px;
        padding:15px 31px;
        text-decoration:none;
    }
    .bg:nth-child(2):hover {
        background-color:#5cbf2a;
        box-shadow: 0px 0px 33px 14px #3dc21b;
        text-shadow:0px 0px 0px #2f6627;
    }
    .bg:nth-child(2):hover body{
        background-color: black !important;
        z-index: 1000;
    }
    .bg:nth-child(2):active {
        position:relative;
        top:1px;
    }

</style>
